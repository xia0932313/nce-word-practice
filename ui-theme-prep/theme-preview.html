<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>UI Theme Preview</title>
    <style>
      :root {
        color-scheme: light;
        --accent: #1e88e5;
        --accent-strong: #1565c0;
        --accent-soft: #e3f2fd;
        --ink: #17212f;
        --muted: #64748b;
        --line: #d9e4ef;
        --paper: #ffffff;
        --soft: #f6f9fc;
        --gold: #ffc943;
        --bad: #ff6b5f;
        --good: #2fbf71;
        --shadow: 0 18px 50px rgba(31, 60, 92, 0.14);
        --radius: 8px;
        --texture: none;
        --backdrop:
          linear-gradient(90deg, rgba(30, 136, 229, 0.07) 1px, transparent 1px),
          linear-gradient(180deg, rgba(30, 136, 229, 0.07) 1px, transparent 1px);
      }

      [data-theme="wild-kingdom"] {
        --accent: #1f8f7a;
        --accent-strong: #176858;
        --accent-soft: #dff4e5;
        --ink: #213426;
        --muted: #63715f;
        --line: #c7d9ba;
        --paper: #fff8df;
        --soft: #eaf3d5;
        --gold: #f3bd4f;
        --bad: #cc6248;
        --good: #42a66b;
        --shadow: 0 18px 46px rgba(36, 74, 46, 0.18);
        --texture: linear-gradient(135deg, rgba(31, 143, 122, 0.08) 25%, transparent 25% 50%, rgba(31, 143, 122, 0.08) 50% 75%, transparent 75%);
        --backdrop:
          radial-gradient(circle at 14% 16%, rgba(243, 189, 79, 0.26), transparent 16rem),
          linear-gradient(120deg, rgba(31, 143, 122, 0.14), transparent 38%),
          linear-gradient(180deg, rgba(255, 248, 223, 0.72), rgba(234, 243, 213, 0.96));
      }

      [data-theme="ember-fellowship"] {
        --accent: #8c4e2b;
        --accent-strong: #6c3722;
        --accent-soft: #f2dec2;
        --ink: #2d231b;
        --muted: #76685a;
        --line: #d0b893;
        --paper: #fff2d3;
        --soft: #ead9b8;
        --gold: #e8b75a;
        --bad: #a84c3f;
        --good: #4f7f5b;
        --shadow: 0 18px 50px rgba(70, 43, 27, 0.2);
        --texture:
          linear-gradient(90deg, rgba(140, 78, 43, 0.08) 1px, transparent 1px),
          linear-gradient(180deg, rgba(140, 78, 43, 0.06) 1px, transparent 1px);
        --backdrop:
          radial-gradient(circle at 84% 12%, rgba(232, 183, 90, 0.28), transparent 16rem),
          linear-gradient(130deg, rgba(45, 35, 27, 0.10), transparent 42%),
          linear-gradient(180deg, rgba(255, 242, 211, 0.88), rgba(234, 217, 184, 0.98));
      }

      [data-theme="pocket-future"] {
        --accent: #2086d7;
        --accent-strong: #1668aa;
        --accent-soft: #dff1ff;
        --ink: #1d2b3a;
        --muted: #627489;
        --line: #bcd8ec;
        --paper: #ffffff;
        --soft: #edf8ff;
        --gold: #ffd24f;
        --bad: #f35b58;
        --good: #35b779;
        --shadow: 0 16px 42px rgba(32, 134, 215, 0.16);
        --radius: 14px;
        --backdrop:
          radial-gradient(circle at 14% 14%, rgba(255, 210, 79, 0.28), transparent 12rem),
          radial-gradient(circle at 88% 18%, rgba(243, 91, 88, 0.14), transparent 10rem),
          linear-gradient(90deg, rgba(32, 134, 215, 0.08) 1px, transparent 1px),
          linear-gradient(180deg, rgba(32, 134, 215, 0.08) 1px, transparent 1px);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--backdrop), var(--soft);
        background-size: auto, auto, 28px 28px, 28px 28px;
        color: var(--ink);
        font-family: "Microsoft YaHei", "PingFang SC", "Segoe UI", Arial, sans-serif;
      }

      button,
      select,
      input {
        font: inherit;
      }

      button {
        border: 0;
        cursor: pointer;
      }

      .shell {
        width: min(1180px, 100%);
        margin: 0 auto;
        padding: 18px;
      }

      .theme-switcher {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-bottom: 16px;
      }

      .theme-switcher button,
      .tab,
      .primary,
      .secondary,
      select,
      input,
      .choice {
        min-height: 44px;
        border-radius: var(--radius);
      }

      .theme-switcher button {
        border: 1px solid var(--line);
        background: var(--paper);
        color: var(--accent-strong);
        padding: 10px 14px;
        font-weight: 800;
      }

      .theme-switcher button[aria-pressed="true"] {
        border-color: var(--accent);
        background: var(--accent);
        color: #fff;
      }

      .topbar {
        display: grid;
        grid-template-columns: minmax(240px, 1fr) minmax(320px, 480px) minmax(220px, 300px);
        align-items: center;
        gap: 18px;
        margin-bottom: 18px;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .brand-mark {
        display: grid;
        place-items: center;
        width: 58px;
        height: 58px;
        border-radius: var(--radius);
        background: var(--accent);
        border: 5px solid var(--paper);
        box-shadow: var(--shadow);
      }

      [data-theme="default"] .brand-mark {
        border-radius: 50%;
      }

      .brand-mark svg {
        width: 36px;
        height: 36px;
      }

      .eyebrow {
        margin: 0 0 4px;
        color: var(--accent-strong);
        font-size: 0.78rem;
        font-weight: 800;
        letter-spacing: 0;
        text-transform: uppercase;
      }

      h1,
      h2,
      h3,
      p {
        margin-top: 0;
      }

      h1 {
        margin-bottom: 0;
        font-size: 2rem;
      }

      h2 {
        margin-bottom: 0;
        font-size: 2.1rem;
        line-height: 1.2;
      }

      .tabs {
        display: grid;
        grid-template-columns: repeat(4, minmax(72px, 1fr));
        gap: 8px;
      }

      .tab {
        border: 1px solid var(--line);
        background: var(--paper);
        color: var(--muted);
        padding: 10px 12px;
        font-weight: 800;
      }

      .tab.active {
        border-color: var(--accent);
        background: var(--accent);
        color: #fff;
        box-shadow: 0 8px 0 rgba(0, 0, 0, 0.10);
      }

      .profile-switcher {
        display: grid;
        grid-template-columns: minmax(120px, 1fr) auto;
        gap: 8px;
      }

      select,
      input {
        width: 100%;
        border: 1px solid var(--line);
        background: var(--paper);
        color: var(--ink);
        padding: 0 12px;
      }

      .toolbar {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(145px, 1fr));
        gap: 10px;
        margin-bottom: 12px;
      }

      label {
        color: var(--muted);
        font-weight: 800;
      }

      label span {
        display: block;
        margin-bottom: 6px;
        font-size: 0.85rem;
      }

      .mission-panel {
        display: grid;
        grid-template-columns: repeat(4, minmax(120px, 1fr));
        gap: 10px;
        margin-bottom: 12px;
      }

      .mission-card,
      .daily-strip,
      .question-panel,
      .side-panel,
      .stat-tile,
      .reward-box,
      .asset-card {
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: var(--texture), rgba(255, 255, 255, 0.92);
        background-size: 18px 18px;
        box-shadow: var(--shadow);
      }

      .mission-card {
        display: grid;
        min-height: 86px;
        padding: 12px;
        color: var(--ink);
        text-align: left;
      }

      .mission-card span {
        color: var(--muted);
        font-weight: 850;
      }

      .mission-card strong {
        align-self: end;
        font-size: 2.2rem;
      }

      .mission-card.active {
        border-color: var(--accent);
        background: var(--accent);
        color: #fff;
      }

      .mission-card.active span {
        color: rgba(255, 255, 255, 0.84);
      }

      .daily-strip {
        display: grid;
        grid-template-columns: minmax(180px, 300px) 1fr;
        gap: 14px;
        align-items: center;
        padding: 12px 14px;
        margin-bottom: 12px;
      }

      .meter {
        height: 14px;
        overflow: hidden;
        border-radius: 999px;
        background: color-mix(in srgb, var(--line) 72%, var(--paper));
      }

      .meter i {
        display: block;
        width: 64%;
        height: 100%;
        border-radius: inherit;
        background: linear-gradient(90deg, var(--accent), var(--good), var(--gold));
      }

      .practice-grid {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 250px;
        gap: 14px;
        align-items: start;
      }

      .question-panel {
        min-height: 520px;
        padding: 22px;
      }

      .question-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 14px;
      }

      .icon-button {
        display: grid;
        place-items: center;
        width: 56px;
        height: 56px;
        border-radius: 50%;
        background: var(--gold);
        color: var(--ink);
        box-shadow: inset 0 -5px 0 rgba(0, 0, 0, 0.12);
      }

      .prompt-box {
        display: grid;
        place-items: center;
        min-height: 154px;
        margin: 22px 0 16px;
        padding: 20px;
        border: 2px solid var(--accent-soft);
        border-radius: var(--radius);
        background: color-mix(in srgb, var(--paper) 82%, var(--accent-soft));
        text-align: center;
      }

      [data-theme="wild-kingdom"] .prompt-box {
        border-style: double;
      }

      [data-theme="ember-fellowship"] .prompt-box {
        border-width: 3px;
      }

      .prompt-main {
        display: block;
        overflow-wrap: anywhere;
        font-size: 3.2rem;
        font-weight: 900;
        line-height: 1.12;
      }

      .prompt-sub {
        display: block;
        margin-top: 10px;
        color: var(--muted);
        font-size: 1.15rem;
        line-height: 1.35;
      }

      .choice-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
      }

      .choice {
        min-height: 74px;
        border: 1px solid var(--line);
        background: var(--paper);
        color: var(--ink);
        padding: 12px 14px;
        text-align: left;
        font-weight: 850;
        line-height: 1.35;
      }

      .choice.correct {
        border-color: var(--good);
        background: color-mix(in srgb, var(--good) 14%, var(--paper));
      }

      .choice.wrong {
        border-color: var(--bad);
        background: color-mix(in srgb, var(--bad) 14%, var(--paper));
      }

      .feedback {
        min-height: 74px;
        margin-top: 10px;
        padding: 12px 14px;
        border-radius: var(--radius);
        background: color-mix(in srgb, var(--accent-soft) 45%, var(--paper));
        color: var(--muted);
        font-weight: 780;
        line-height: 1.45;
      }

      .actions {
        display: flex;
        justify-content: flex-end;
        gap: 10px;
        margin-top: 14px;
      }

      .primary,
      .secondary {
        padding: 11px 16px;
        font-weight: 800;
      }

      .primary {
        background: var(--accent);
        color: #fff;
      }

      .secondary {
        border: 1px solid var(--line);
        background: var(--paper);
        color: var(--accent-strong);
      }

      .side-panel {
        display: grid;
        gap: 10px;
        padding: 14px;
      }

      .stat-tile {
        display: flex;
        align-items: center;
        justify-content: space-between;
        min-height: 74px;
        padding: 12px;
        box-shadow: none;
      }

      .stat-tile span {
        color: var(--muted);
        font-weight: 800;
      }

      .stat-tile strong {
        font-size: 1.7rem;
      }

      .reward-box {
        min-height: 120px;
        padding: 12px;
        box-shadow: none;
      }

      .reward-line {
        display: grid;
        grid-template-columns: 58px 1fr;
        gap: 12px;
        align-items: center;
      }

      .reward-icon,
      .asset-icon {
        display: grid;
        place-items: center;
        border-radius: var(--radius);
        background: var(--accent-soft);
        min-height: 58px;
      }

      .reward-icon svg,
      .asset-icon svg {
        width: 40px;
        height: 40px;
      }

      .asset-strip {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 10px;
        margin-top: 14px;
      }

      .asset-card {
        display: grid;
        grid-template-columns: 58px 1fr;
        gap: 10px;
        align-items: center;
        padding: 10px;
        box-shadow: none;
      }

      .asset-card strong {
        display: block;
        margin-bottom: 4px;
      }

      .asset-card span,
      .reward-line span {
        color: var(--muted);
        font-size: 0.92rem;
        font-weight: 760;
      }

      @media (max-width: 900px) {
        .topbar,
        .practice-grid,
        .daily-strip,
        .mission-panel,
        .asset-strip {
          grid-template-columns: 1fr;
        }

        .side-panel {
          grid-template-columns: repeat(3, minmax(0, 1fr));
        }

        .reward-box {
          grid-column: 1 / -1;
        }
      }

      @media (max-width: 620px) {
        .shell {
          padding: 12px;
        }

        .tabs,
        .choice-grid,
        .side-panel {
          grid-template-columns: 1fr;
        }

        .question-panel {
          min-height: auto;
          padding: 16px;
        }

        .question-head {
          align-items: flex-start;
        }

        .prompt-main {
          font-size: 2.25rem;
        }

        .actions {
          flex-direction: column-reverse;
        }

        .actions button {
          width: 100%;
        }
      }
    </style>
  </head>
  <body data-theme="default">
    <div class="shell">
      <div class="theme-switcher" aria-label="界面风格">
        <button type="button" data-set-theme="default" aria-pressed="true">默认</button>
        <button type="button" data-set-theme="wild-kingdom" aria-pressed="false">荒野遗迹</button>
        <button type="button" data-set-theme="ember-fellowship" aria-pressed="false">远征史诗</button>
        <button type="button" data-set-theme="pocket-future" aria-pressed="false">口袋未来</button>
      </div>

      <header class="topbar">
        <div class="brand">
          <div class="brand-mark" aria-hidden="true" id="brandMark"></div>
          <div>
            <p class="eyebrow" id="themeEyebrow">New Concept Words</p>
            <h1 id="themeTitle">新概念单词练习</h1>
          </div>
        </div>
        <nav class="tabs" aria-label="主导航">
          <button class="tab active" type="button">练习</button>
          <button class="tab" type="button">错词本</button>
          <button class="tab" type="button">统计</button>
          <button class="tab" type="button">设置</button>
        </nav>
        <div class="profile-switcher">
          <select aria-label="选择账户">
            <option>小小学习者</option>
          </select>
          <button class="secondary" type="button">账户</button>
        </div>
      </header>

      <main>
        <div class="toolbar">
          <label>
            <span>册数</span>
            <select><option>第一册</option></select>
          </label>
          <label>
            <span>课次</span>
            <select><option>全部课程</option></select>
          </label>
          <label>
            <span>课次区间</span>
            <input type="text" value="1-20">
          </label>
          <label>
            <span>模式</span>
            <select><option>智能分层</option></select>
          </label>
        </div>

        <div class="mission-panel" id="missionPanel"></div>

        <div class="daily-strip">
          <div>
            <strong id="dailyTitle">今日进度</strong>
            <span>19 / 30</span>
          </div>
          <div class="meter" aria-hidden="true"><i></i></div>
        </div>

        <div class="practice-grid">
          <section class="question-panel">
            <div class="question-head">
              <div>
                <p class="eyebrow" id="questionMeta">Book 1 · Lesson 12</p>
                <h2 id="questionTitle">选择正确释义</h2>
              </div>
              <button class="icon-button" type="button" aria-label="朗读单词" id="soundButton"></button>
            </div>

            <div class="prompt-box">
              <span class="prompt-main">adventure</span>
              <span class="prompt-sub" id="promptSub">/ədˈventʃə/</span>
            </div>

            <div class="choice-grid">
              <button class="choice correct" type="button">冒险；奇遇</button>
              <button class="choice" type="button">安静；沉默</button>
              <button class="choice" type="button">地址；住址</button>
              <button class="choice wrong" type="button">机器；设备</button>
            </div>

            <div class="feedback" id="feedbackText">连续答对 5 题，奖励已点亮。</div>

            <div class="actions">
              <button class="secondary" type="button">换一题</button>
              <button class="primary" type="button" id="mainAction">下一题</button>
            </div>

            <div class="asset-strip" id="assetStrip"></div>
          </section>

          <aside class="side-panel">
            <div class="stat-tile"><span>连对</span><strong>5</strong></div>
            <div class="stat-tile"><span>正确率</span><strong>92%</strong></div>
            <div class="stat-tile"><span>错词</span><strong>3</strong></div>
            <div class="stat-tile"><span>本组</span><strong>19/30</strong></div>
            <div class="stat-tile"><span>强化</span><strong>7</strong></div>
            <div class="reward-box">
              <p class="eyebrow">奖励槽</p>
              <div class="reward-line">
                <div class="reward-icon" id="rewardIcon" aria-hidden="true"></div>
                <div>
                  <strong id="rewardTitle">获得星星奖励</strong>
                  <span id="rewardDetail">完成本组练习后出现。</span>
                </div>
              </div>
            </div>
          </aside>
        </div>
      </main>
    </div>

      function setTheme(theme) {
        document.body.dataset.theme = theme;
        document.querySelectorAll("[data-set-theme]").forEach((button) => {
          button.setAttribute("aria-pressed", String(button.dataset.setTheme === theme));
        });
        const themeSvg = svg[theme];

        soundButton.innerHTML = themeSvg.sound;
